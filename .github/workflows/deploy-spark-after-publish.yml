name: Deploy Spark After Image Publish

on:
  workflow_run:
    workflows: ["Publish Service Images"]
    types: [completed]

permissions:
  contents: read
  actions: write

concurrency:
  group: spark-chain-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: false

jobs:
  dispatch-deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify self-hosted runner heartbeat
        env:
          GH_TOKEN: ${{ secrets.RUNNER_HEARTBEAT_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/check_runner_heartbeat.py \
            --repo "${GITHUB_REPOSITORY}" \
            --runner-name "spark-runtime-01" \
            --required-labels "self-hosted,linux,spark-runtime" \
            --checks 2 \
            --interval-seconds 10
      - name: Trigger pinned Spark deploy for published SHA
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.workflow_run.head_sha;

            core.info(`Dispatching deploy-spark.yml for SHA ${sha}`);

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: "deploy-spark.yml",
              ref: "main",
              inputs: {
                use_pinned_images: "true",
                image_tag: sha,
                verify_signatures: "true",
                deploy_frontend: "false",
                run_smoke: "true",
                rollback_on_smoke_failure: "true",
                runner_type: "self-hosted",
                cost_override: "false",
              },
            });

            core.info("deploy-spark.yml dispatch submitted.");
