name: Text Training Pipeline

on:
  workflow_dispatch:
    inputs:
      training_mode:
        description: "Training mode"
        required: true
        type: choice
        options:
          - a100_single
          - v100_sweep
        default: a100_single
      max_train_samples:
        description: "Optional sample cap (0 = full)"
        required: true
        default: "0"
      fp_penalty:
        description: "False-positive penalty weight for human class"
        required: true
        default: "1.7"
      v100_profile:
        description: "V100 profile (all runs all 5 shards)"
        required: true
        type: choice
        options:
          - all
          - v11_fp_sweep_lr2e5_pen17
          - v11_fp_sweep_lr3e5_pen20
          - v11_fp_sweep_lr15e5_pen15
          - v11_fp_sweep_lr25e5_pen18
          - v11_fp_sweep_lr1e5_pen22
        default: all
      cuda_visible_devices:
        description: "CUDA_VISIBLE_DEVICES value to pin training GPU(s)"
        required: true
        default: "0"

permissions:
  contents: read

jobs:
  train-a100:
    if: ${{ github.event.inputs.training_mode == 'a100_single' }}
    runs-on: [self-hosted, linux, x64, a100]
    timeout-minutes: 360
    env:
      CUDA_VISIBLE_DEVICES: ${{ github.event.inputs.cuda_visible_devices }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend ML dependencies
        run: |
          cd backend
          pip install -e ".[dev,ml]"

      - name: Build text dataset
        run: |
          make build-text-dataset

      - name: Build hard negatives from latest benchmark
        run: |
          make build-hard-negatives INCLUDE_FALSE_NEGATIVES=1 || true

      - name: Run A100 targeted fine-tune
        run: |
          make train-text-a100 \
            MAX_TRAIN_SAMPLES="${{ github.event.inputs.max_train_samples }}" \
            FP_PENALTY="${{ github.event.inputs.fp_penalty }}" \
            RUN_NAME="v11_text_fp_a100_${{ github.run_id }}"

      - name: Resolve trained model path
        run: |
          RESOLVED="$(python3 - <<'PY'
          import json
          from pathlib import Path

          latest_path = Path("backend/evidence/models/text/latest.json")
          payload = json.loads(latest_path.read_text(encoding="utf-8"))
          run_id = payload.get("run_id", "")
          model_path = payload.get("model_path")
          if model_path:
              print(f"{run_id}\n{model_path}")
          else:
              manifest = payload.get("manifest")
              if manifest:
                  print(f"{run_id}\n{str(Path(manifest).parent)}")
              else:
                  print("")
          PY
          )"
          TEXT_MODEL_RUN_ID="$(printf '%s\n' "$RESOLVED" | sed -n '1p')"
          MODEL_PATH="$(printf '%s\n' "$RESOLVED" | sed -n '2p')"
          if [ -z "$MODEL_PATH" ]; then
            echo "Could not resolve model path from backend/evidence/models/text/latest.json" >&2
            exit 1
          fi
          echo "TEXT_DETECTION_MODEL_PATH=$MODEL_PATH" >> "$GITHUB_ENV"
          if [ -n "$TEXT_MODEL_RUN_ID" ]; then
            echo "TEXT_MODEL_RUN_ID=$TEXT_MODEL_RUN_ID" >> "$GITHUB_ENV"
          fi
          echo "Resolved model path: $MODEL_PATH"

      - name: Refresh calibration after training
        run: |
          make calibrate-text MIN_SAMPLES=120 MIN_DOMAIN_SAMPLES=40
          make text-quality-gate MAX_FP_RATE=0.08 MAX_ECE=0.08 MAX_DOMAIN_FP_RATE=0.30 MIN_DOMAIN_SAMPLE_COUNT=30

      - name: Write training bundle manifest
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          payload = {
              "generated_at": datetime.now(UTC).isoformat(),
              "run_id": os.getenv("TEXT_MODEL_RUN_ID", ""),
              "model_path": os.getenv("TEXT_DETECTION_MODEL_PATH", ""),
              "calibration_profile_path": "backend/app/detection/text/calibration_profile.json",
          }
          output = Path("backend/evidence/models/text/training_bundle_manifest.json")
          output.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print(f"Wrote {output}")
          PY

      - name: Build quality summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("backend/evidence/calibration/text/latest_text_calibration.json").read_text(encoding="utf-8"))
          gate = json.loads(Path("backend/evidence/calibration/text/quality_gate.json").read_text(encoding="utf-8"))
          lines = [
              "## Text Training Quality Summary",
              f"- quality_gate: `{gate.get('status', 'n/a')}`",
              f"- fp_rate: `{gate.get('fp_rate', 'n/a')}`",
              f"- ece: `{gate.get('ece', 'n/a')}`",
              f"- uncertainty_margin: `{gate.get('uncertainty_margin', 'n/a')}`",
              f"- recommended_threshold: `{report.get('recommended_threshold', 'n/a')}`",
              f"- recommended_uncertainty_margin: `{report.get('recommended_uncertainty_margin', 'n/a')}`",
              "",
              "### Domain Gate",
          ]
          for item in gate.get("domain_checks", []):
              lines.append(
                  f"- {item.get('domain')}: status={item.get('status')} fp_rate={item.get('fp_rate')} "
                  f"samples={item.get('sample_count')} reason={item.get('reason') or '-'}"
              )
          if gate.get("failures"):
              lines.extend(["", "### Failures"])
              lines.extend([f"- {failure}" for failure in gate["failures"]])
          summary = "\n".join(lines) + "\n"
          Path("training-quality-summary.md").write_text(summary, encoding="utf-8")
          print(summary)
          PY

      - name: Enforce golden-pair regression gate
        run: |
          cd backend
          pytest tests/test_text_detector_golden_pairs.py -q -o addopts=''

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: text-training-artifacts-a100
          path: |
            ${{ env.TEXT_DETECTION_MODEL_PATH }}/**
            backend/evidence/models/text/**/training_manifest.json
            backend/evidence/models/text/latest.json
            backend/evidence/models/text/training_bundle_manifest.json
            backend/evidence/calibration/text/latest_text_calibration.json
            backend/evidence/calibration/text/quality_gate.json
            backend/evidence/calibration/text/quality_gate.md
            backend/app/detection/text/calibration_profile.json
            training-quality-summary.md
          retention-days: 30

  train-v100-sweep:
    if: ${{ github.event.inputs.training_mode == 'v100_sweep' }}
    runs-on: [self-hosted, linux, x64, v100]
    timeout-minutes: 360
    env:
      CUDA_VISIBLE_DEVICES: ${{ github.event.inputs.cuda_visible_devices }}
    strategy:
      fail-fast: false
      matrix:
        profile: ${{ fromJson(github.event.inputs.v100_profile == 'all' && '["v11_fp_sweep_lr2e5_pen17","v11_fp_sweep_lr3e5_pen20","v11_fp_sweep_lr15e5_pen15","v11_fp_sweep_lr25e5_pen18","v11_fp_sweep_lr1e5_pen22"]' || format('["{0}"]', github.event.inputs.v100_profile)) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend ML dependencies
        run: |
          cd backend
          pip install -e ".[dev,ml]"

      - name: Build text dataset
        run: |
          make build-text-dataset

      - name: Build hard negatives from latest benchmark
        run: |
          make build-hard-negatives INCLUDE_FALSE_NEGATIVES=1 || true

      - name: Run V100 sweep shard
        run: |
          make sweep-text-v100 EXECUTE=1 PROFILE="${{ matrix.profile }}"

      - name: Resolve trained model path
        run: |
          RESOLVED="$(python3 - <<'PY'
          import json
          from pathlib import Path

          latest_path = Path("backend/evidence/models/text/latest.json")
          payload = json.loads(latest_path.read_text(encoding="utf-8"))
          run_id = payload.get("run_id", "")
          model_path = payload.get("model_path")
          if model_path:
              print(f"{run_id}\n{model_path}")
          else:
              manifest = payload.get("manifest")
              if manifest:
                  print(f"{run_id}\n{str(Path(manifest).parent)}")
              else:
                  print("")
          PY
          )"
          TEXT_MODEL_RUN_ID="$(printf '%s\n' "$RESOLVED" | sed -n '1p')"
          MODEL_PATH="$(printf '%s\n' "$RESOLVED" | sed -n '2p')"
          if [ -z "$MODEL_PATH" ]; then
            echo "Could not resolve model path from backend/evidence/models/text/latest.json" >&2
            exit 1
          fi
          echo "TEXT_DETECTION_MODEL_PATH=$MODEL_PATH" >> "$GITHUB_ENV"
          if [ -n "$TEXT_MODEL_RUN_ID" ]; then
            echo "TEXT_MODEL_RUN_ID=$TEXT_MODEL_RUN_ID" >> "$GITHUB_ENV"
          fi
          echo "Resolved model path: $MODEL_PATH"

      - name: Refresh calibration after training
        run: |
          make calibrate-text MIN_SAMPLES=120 MIN_DOMAIN_SAMPLES=40
          make text-quality-gate MAX_FP_RATE=0.08 MAX_ECE=0.08 MAX_DOMAIN_FP_RATE=0.30 MIN_DOMAIN_SAMPLE_COUNT=30

      - name: Write training bundle manifest
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import UTC, datetime
          from pathlib import Path

          payload = {
              "generated_at": datetime.now(UTC).isoformat(),
              "run_id": os.getenv("TEXT_MODEL_RUN_ID", ""),
              "model_path": os.getenv("TEXT_DETECTION_MODEL_PATH", ""),
              "calibration_profile_path": "backend/app/detection/text/calibration_profile.json",
          }
          output = Path("backend/evidence/models/text/training_bundle_manifest.json")
          output.write_text(json.dumps(payload, ensure_ascii=False, indent=2), encoding="utf-8")
          print(f"Wrote {output}")
          PY

      - name: Build quality summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path("backend/evidence/calibration/text/latest_text_calibration.json").read_text(encoding="utf-8"))
          gate = json.loads(Path("backend/evidence/calibration/text/quality_gate.json").read_text(encoding="utf-8"))
          lines = [
              "## Text Training Quality Summary",
              f"- quality_gate: `{gate.get('status', 'n/a')}`",
              f"- fp_rate: `{gate.get('fp_rate', 'n/a')}`",
              f"- ece: `{gate.get('ece', 'n/a')}`",
              f"- uncertainty_margin: `{gate.get('uncertainty_margin', 'n/a')}`",
              f"- recommended_threshold: `{report.get('recommended_threshold', 'n/a')}`",
              f"- recommended_uncertainty_margin: `{report.get('recommended_uncertainty_margin', 'n/a')}`",
              "",
              "### Domain Gate",
          ]
          for item in gate.get("domain_checks", []):
              lines.append(
                  f"- {item.get('domain')}: status={item.get('status')} fp_rate={item.get('fp_rate')} "
                  f"samples={item.get('sample_count')} reason={item.get('reason') or '-'}"
              )
          if gate.get("failures"):
              lines.extend(["", "### Failures"])
              lines.extend([f"- {failure}" for failure in gate["failures"]])
          summary = "\n".join(lines) + "\n"
          Path("training-quality-summary.md").write_text(summary, encoding="utf-8")
          print(summary)
          PY

      - name: Enforce golden-pair regression gate
        run: |
          cd backend
          pytest tests/test_text_detector_golden_pairs.py -q -o addopts=''

      - name: Upload training artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: text-training-artifacts-${{ matrix.profile }}
          path: |
            ${{ env.TEXT_DETECTION_MODEL_PATH }}/**
            backend/evidence/models/text/**/training_manifest.json
            backend/evidence/models/text/latest.json
            backend/evidence/models/text/training_bundle_manifest.json
            backend/evidence/calibration/text/latest_text_calibration.json
            backend/evidence/calibration/text/quality_gate.json
            backend/evidence/calibration/text/quality_gate.md
            backend/app/detection/text/calibration_profile.json
            training-quality-summary.md
