name: Weekly Text Calibration Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  calibrate-text:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Run text calibration refresh
        run: |
          cd backend
          python scripts/evaluate_detection_calibration.py \
            --input ../benchmark/datasets/detection_multidomain.jsonl \
            --content-type text \
            --output evidence/calibration/text/latest_text_calibration.json \
            --write-profile \
            --profile-output app/detection/text/calibration_profile.json \
            --min-samples 120 \
            --include-domain-profiles \
            --min-domain-samples 40

      - name: Enforce text quality gate (FP + ECE)
        run: |
          python backend/scripts/check_text_quality_gate.py \
            --report backend/evidence/calibration/text/latest_text_calibration.json \
            --max-fp-rate 0.08 \
            --max-ece 0.08 \
            --min-sample-count 120 \
            --output-json backend/evidence/calibration/text/quality_gate.json \
            --output-md backend/evidence/calibration/text/quality_gate.md

      - name: Enforce golden-pair regression gate
        run: |
          cd backend
          pytest tests/test_text_detector_golden_pairs.py -q -o addopts=''

      - name: Build calibration summary
        id: summary
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('backend/evidence/calibration/text/latest_text_calibration.json').read_text(encoding='utf-8'))
          gate = json.loads(Path('backend/evidence/calibration/text/quality_gate.json').read_text(encoding='utf-8'))
          domain_profiles = report.get('domain_profiles', {})
          out = Path('calibration-summary.md')
          out.write_text(
              "## Weekly Text Calibration Summary\\n"
              f"- sample_count: {report.get('sample_count')}\\n"
              f"- recommended_threshold: {report.get('recommended_threshold')}\\n"
              f"- recommended_uncertainty_margin: {report.get('recommended_uncertainty_margin')}\\n"
              f"- ece: {report.get('ece')}\\n"
              f"- brier_score: {report.get('brier_score')}\\n"
              f"- quality_gate: {gate.get('status')}\\n"
              f"- domain_profiles_count: {len(domain_profiles)}\\n",
              encoding='utf-8',
          )
          print(out.read_text(encoding='utf-8'))
          PY

      - name: Upload calibration report artifact
        uses: actions/upload-artifact@v7
        with:
          name: weekly-text-calibration-report
          path: |
            backend/evidence/calibration/text/latest_text_calibration.json
            backend/evidence/calibration/text/quality_gate.json
            backend/evidence/calibration/text/quality_gate.md
            calibration-summary.md
          retention-days: 30

      - name: Open calibration refresh PR (manual review required)
        id: calibration_pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/weekly-text-calibration
          delete-branch: true
          commit-message: "chore(text): weekly calibration refresh"
          title: "chore(text): weekly calibration refresh (threshold/margin)"
          body-path: calibration-summary.md

      - name: Append calibration PR outcome
        if: ${{ always() }}
        env:
          PR_OUTCOME: ${{ steps.calibration_pr.outcome }}
          PR_URL: ${{ steps.calibration_pr.outputs.pull-request-url }}
        run: |
          {
            echo "## Weekly Calibration PR Outcome"
            if [ "${PR_OUTCOME}" = "success" ] && [ -n "${PR_URL}" ]; then
              echo "- Status: opened"
              echo "- PR: ${PR_URL}"
            elif [ "${PR_OUTCOME}" = "success" ]; then
              echo "- Status: no PR created (no diff detected)"
              echo "- Note: calibration artifacts and summary are still available for manual review."
            else
              echo "- Status: auto-PR step failed (non-blocking)"
              echo "- Note: calibration artifacts and summary are ready; open PR manually if needed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
