name: Publish Service Images

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/publish-images.yml"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      ENABLE_CVE_POLICY_GATE: ${{ vars.ENABLE_CVE_POLICY_GATE || 'false' }}
      CVE_MAX_CRITICAL: ${{ vars.CVE_MAX_CRITICAL || '0' }}
      CVE_MAX_HIGH: ${{ vars.CVE_MAX_HIGH || '0' }}
    strategy:
      fail-fast: false
      matrix:
        component: [api, worker]
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.component }} image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:latest
            ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v3.7.0
      - name: Sign GHCR images (keyless)
        env:
          IMAGE_SHA_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
          IMAGE_LATEST_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:latest
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_SHA_TAG}"
          cosign sign --yes "${IMAGE_LATEST_TAG}"
      - name: Generate SBOM (SPDX JSON)
        env:
          IMAGE_SHA_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
          SBOM_PATH: sbom-${{ matrix.component }}-${{ github.sha }}.spdx.json
        run: |
          set -euo pipefail
          docker run --rm --pull=always ghcr.io/anchore/syft:latest \
            "${IMAGE_SHA_TAG}" -o spdx-json > "${SBOM_PATH}"
      - name: Attest SBOM (keyless cosign)
        env:
          IMAGE_SHA_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
          SBOM_PATH: sbom-${{ matrix.component }}-${{ github.sha }}.spdx.json
        run: |
          set -euo pipefail
          cosign attest --yes --type spdxjson --predicate "${SBOM_PATH}" "${IMAGE_SHA_TAG}"
      - name: Scan image vulnerabilities (Trivy JSON)
        env:
          IMAGE_SHA_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
          VULN_REPORT: trivy-${{ matrix.component }}-${{ github.sha }}.json
        run: |
          set -euo pipefail
          docker run --rm --pull=always ghcr.io/aquasecurity/trivy:latest image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format json \
            --no-progress \
            "${IMAGE_SHA_TAG}" > "${VULN_REPORT}"
      - name: Enforce CVE policy gate
        env:
          VULN_REPORT: trivy-${{ matrix.component }}-${{ github.sha }}.json
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          report_path = os.environ["VULN_REPORT"]
          gate_enabled = os.getenv("ENABLE_CVE_POLICY_GATE", "false").strip().lower() in {"1", "true", "yes", "on"}
          max_critical = int(os.getenv("CVE_MAX_CRITICAL", "0"))
          max_high = int(os.getenv("CVE_MAX_HIGH", "0"))

          payload = json.loads(open(report_path, encoding="utf-8").read())
          critical = 0
          high = 0
          for result in payload.get("Results", []):
            vulns = result.get("Vulnerabilities") or []
            for vuln in vulns:
              sev = str(vuln.get("Severity", "")).upper()
              if sev == "CRITICAL":
                critical += 1
              elif sev == "HIGH":
                high += 1

          print(f"Trivy summary ({report_path}): critical={critical}, high={high}")
          if not gate_enabled:
            print("CVE gate disabled (ENABLE_CVE_POLICY_GATE=false); continuing.")
            raise SystemExit(0)

          if critical > max_critical or high > max_high:
            print(
              "CVE policy gate failed: "
              f"critical={critical} (max={max_critical}), "
              f"high={high} (max={max_high})"
            )
            raise SystemExit(1)

          print("CVE policy gate passed.")
          PY
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.component }}-${{ github.sha }}
          path: sbom-${{ matrix.component }}-${{ github.sha }}.spdx.json
          retention-days: 30
      - name: Upload vulnerability report artifact
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.component }}-${{ github.sha }}
          path: trivy-${{ matrix.component }}-${{ github.sha }}.json
          retention-days: 30
      - name: Output image refs
        run: |
          echo "ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:latest"
          echo "ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}"
