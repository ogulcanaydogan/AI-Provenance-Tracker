name: Publish Service Images

on:
  workflow_dispatch:
    inputs:
      cost_override:
        description: "Run publish even when cost policy is in block state"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/publish-images.yml"
      - "scripts/check_package_policy.py"
      - "scripts/generate_release_provenance_note.py"
      - "config/package_policy.yaml"
      - "config/cost_policy.yaml"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  cost-precheck:
    runs-on: ubuntu-latest
    outputs:
      allow_run: ${{ steps.gate.outputs.allow_run }}
      status: ${{ steps.gate.outputs.status }}
      override_used: ${{ steps.gate.outputs.override_used }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Evaluate cost policy gate
        id: gate
        run: |
          set -euo pipefail
          mkdir -p ops/reports
          python3 scripts/cost_governance_snapshot.py \
            --repo "${GITHUB_REPOSITORY}" \
            --window-days 30 \
            --gh-token "${GH_TOKEN}" \
            --vercel-token "${VERCEL_TOKEN}" \
            --vercel-project-id "${VERCEL_PROJECT_ID}" \
            --vercel-team-id "${VERCEL_TEAM_ID}" \
            --policy-file config/cost_policy.yaml \
            --workflow-name "${GITHUB_WORKFLOW}" \
            --output-json ops/reports/publish_cost_gate.json \
            --output-md ops/reports/publish_cost_gate.md \
            --fail-on-alert-level none

          status="$(python3 - <<'PY'
          import json
          payload = json.loads(open('ops/reports/publish_cost_gate.json', encoding='utf-8').read())
          print(payload.get('status', 'ok'))
          PY
          )"

          override="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.cost_override || 'false' }}" = "true" ]; then
            override="true"
          fi

          allow_run="true"
          if [ "${status}" = "block" ] && [ "${override}" != "true" ]; then
            allow_run="false"
            echo "::warning::Cost policy is block. Publish job is skipped. Re-dispatch with cost_override=true if required."
          fi

          {
            echo "status=${status}"
            echo "override_used=${override}"
            echo "allow_run=${allow_run}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload cost gate artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: publish-images-cost-gate
          path: ops/reports/publish_cost_gate.*
          retention-days: 14

  package-policy:
    needs: cost-precheck
    if: ${{ needs.cost-precheck.outputs.allow_run == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Enforce package policy allow/deny rules
        run: |
          set -euo pipefail
          python3 scripts/check_package_policy.py \
            --policy-file config/package_policy.yaml \
            --npm-lock frontend/package-lock.json \
            --requirements backend/requirements.txt \
            --output-json ops/reports/package_policy_report.json \
            --output-md ops/reports/package_policy_report.md
      - name: Append package policy report
        run: |
          cat ops/reports/package_policy_report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload package policy artifacts
        uses: actions/upload-artifact@v7.0.0
        with:
          name: package-policy-report
          path: ops/reports/package_policy_report.*
          retention-days: 30

  build-and-push:
    needs: [cost-precheck, package-policy]
    if: ${{ needs.cost-precheck.outputs.allow_run == 'true' }}
    runs-on: ubuntu-latest
    env:
      CVE_FAIL_ON_CRITICAL: ${{ vars.CVE_FAIL_ON_CRITICAL || 'true' }}
      CVE_FAIL_ON_HIGH: ${{ vars.CVE_FAIL_ON_HIGH || 'false' }}
      CVE_MAX_CRITICAL: ${{ vars.CVE_MAX_CRITICAL || '0' }}
      CVE_MAX_HIGH: ${{ vars.CVE_MAX_HIGH || '25' }}
    strategy:
      fail-fast: false
      matrix:
        component: [api, worker]
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.component }} image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:latest
            ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.0
      - name: Sign GHCR images (keyless)
        env:
          IMAGE_SHA_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
          IMAGE_LATEST_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:latest
        run: |
          set -euo pipefail
          cosign sign --yes "${IMAGE_SHA_TAG}"
          cosign sign --yes "${IMAGE_LATEST_TAG}"
      - name: Generate SBOM (SPDX JSON)
        env:
          IMAGE_SHA_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
          SBOM_PATH: sbom-${{ matrix.component }}-${{ github.sha }}.spdx.json
        run: |
          set -euo pipefail
          docker run --rm --pull=always ghcr.io/anchore/syft:latest \
            "${IMAGE_SHA_TAG}" -o spdx-json > "${SBOM_PATH}"
      - name: Attest SBOM (keyless cosign)
        env:
          IMAGE_SHA_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
          SBOM_PATH: sbom-${{ matrix.component }}-${{ github.sha }}.spdx.json
        run: |
          set -euo pipefail
          cosign attest --yes --type spdxjson --predicate "${SBOM_PATH}" "${IMAGE_SHA_TAG}"
      - name: Scan image vulnerabilities (Trivy JSON)
        env:
          IMAGE_SHA_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
          VULN_REPORT: trivy-${{ matrix.component }}-${{ github.sha }}.json
        run: |
          set -euo pipefail
          docker run --rm --pull=always ghcr.io/aquasecurity/trivy:latest image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format json \
            --no-progress \
            "${IMAGE_SHA_TAG}" > "${VULN_REPORT}"
      - name: Enforce moderate CVE policy gate
        env:
          VULN_REPORT: trivy-${{ matrix.component }}-${{ github.sha }}.json
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os

          report_path = os.environ["VULN_REPORT"]
          fail_on_critical = os.getenv("CVE_FAIL_ON_CRITICAL", "true").strip().lower() in {"1", "true", "yes", "on"}
          fail_on_high = os.getenv("CVE_FAIL_ON_HIGH", "false").strip().lower() in {"1", "true", "yes", "on"}
          max_critical = int(os.getenv("CVE_MAX_CRITICAL", "0"))
          max_high = int(os.getenv("CVE_MAX_HIGH", "25"))

          payload = json.loads(open(report_path, encoding="utf-8").read())
          critical = 0
          high = 0
          for result in payload.get("Results", []):
            vulns = result.get("Vulnerabilities") or []
            for vuln in vulns:
              sev = str(vuln.get("Severity", "")).upper()
              if sev == "CRITICAL":
                critical += 1
              elif sev == "HIGH":
                high += 1

          print(f"Trivy summary ({report_path}): critical={critical}, high={high}")

          if fail_on_critical and critical > max_critical:
            print(
              "CVE policy gate failed (critical): "
              f"critical={critical} (max={max_critical})"
            )
            raise SystemExit(1)

          if high > max_high:
            if fail_on_high:
              print(
                "CVE policy gate failed (high): "
                f"high={high} (max={max_high})"
              )
              raise SystemExit(1)
            print(
              "::warning::CVE high threshold exceeded "
              f"(high={high}, max={max_high}) but fail_on_high=false."
            )

          print("CVE policy gate passed under moderate enforcement.")
          PY
      - name: Generate release provenance summary
        env:
          IMAGE_SHA_TAG: ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          python3 scripts/generate_release_provenance_note.py \
            --component "${{ matrix.component }}" \
            --image-ref "${IMAGE_SHA_TAG}" \
            --image-digest "${IMAGE_DIGEST}" \
            --trivy-report "trivy-${{ matrix.component }}-${{ github.sha }}.json" \
            --sbom-artifact "sbom-${{ matrix.component }}-${{ github.sha }}.spdx.json" \
            --attestation-type "spdxjson" \
            --signed-keyless "true" \
            --output-json "release-provenance-${{ matrix.component }}-${{ github.sha }}.json" \
            --output-md "release-provenance-${{ matrix.component }}-${{ github.sha }}.md"
      - name: Append release provenance summary
        run: |
          cat "release-provenance-${{ matrix.component }}-${{ github.sha }}.md" >> "$GITHUB_STEP_SUMMARY"
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: sbom-${{ matrix.component }}-${{ github.sha }}
          path: sbom-${{ matrix.component }}-${{ github.sha }}.spdx.json
          retention-days: 30
      - name: Upload vulnerability report artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: trivy-${{ matrix.component }}-${{ github.sha }}
          path: trivy-${{ matrix.component }}-${{ github.sha }}.json
          retention-days: 30
      - name: Upload release provenance artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: release-provenance-${{ matrix.component }}-${{ github.sha }}
          path: |
            release-provenance-${{ matrix.component }}-${{ github.sha }}.json
            release-provenance-${{ matrix.component }}-${{ github.sha }}.md
          retention-days: 30
      - name: Output image refs
        run: |
          echo "ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:latest"
          echo "ghcr.io/${{ github.repository_owner }}/provenance-${{ matrix.component }}:${{ github.sha }}"

  publish-skipped:
    needs: cost-precheck
    if: ${{ needs.cost-precheck.outputs.allow_run != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Report publish skip reason
        run: |
          echo "Publish workflow skipped by cost policy gate." >> "$GITHUB_STEP_SUMMARY"
          echo "- status: ${{ needs.cost-precheck.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- override_used: ${{ needs.cost-precheck.outputs.override_used }}" >> "$GITHUB_STEP_SUMMARY"
