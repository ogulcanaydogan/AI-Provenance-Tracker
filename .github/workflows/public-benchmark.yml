name: Public Provenance Benchmark

on:
  workflow_dispatch:
    inputs:
      cost_override:
        description: "Run benchmark even when cost policy is in block state"
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
      benchmark_profile:
        description: "Benchmark profile to run"
        required: true
        type: choice
        options:
          - smoke
          - full
        default: smoke
  push:
    branches: [main]
    paths:
      - "benchmark/**"
      - ".github/workflows/public-benchmark.yml"
  pull_request:
    paths:
      - "benchmark/**"
      - ".github/workflows/public-benchmark.yml"
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  actions: read

jobs:
  cost-precheck:
    runs-on: ubuntu-latest
    outputs:
      allow_run: ${{ steps.gate.outputs.allow_run }}
      status: ${{ steps.gate.outputs.status }}
      override_used: ${{ steps.gate.outputs.override_used }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TEAM_ID: ${{ vars.VERCEL_TEAM_ID }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Evaluate cost policy gate
        id: gate
        run: |
          set -euo pipefail
          mkdir -p benchmark/results/ci
          python3 scripts/cost_governance_snapshot.py \
            --repo "${GITHUB_REPOSITORY}" \
            --window-days 30 \
            --gh-token "${GH_TOKEN}" \
            --vercel-token "${VERCEL_TOKEN}" \
            --vercel-project-id "${VERCEL_PROJECT_ID}" \
            --vercel-team-id "${VERCEL_TEAM_ID}" \
            --policy-file config/cost_policy.yaml \
            --workflow-name "${GITHUB_WORKFLOW}" \
            --output-json benchmark/results/ci/cost_gate.json \
            --output-md benchmark/results/ci/cost_gate.md \
            --fail-on-alert-level none

          status="$(python3 -c 'import json; payload=json.loads(open("benchmark/results/ci/cost_gate.json", encoding="utf-8").read()); print(payload.get("status","ok"))')"

          override="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.cost_override || 'false' }}" = "true" ]; then
            override="true"
          fi
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            has_label="$(python3 -c 'import json, os; payload=json.loads(open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8").read()); labels=[item.get("name","") for item in payload.get("pull_request",{}).get("labels",[])]; print("true" if "cost-override-approved" in labels else "false")')"
            if [ "${has_label}" = "true" ]; then
              override="true"
            fi
          fi

          allow_run="true"
          if [ "${status}" = "block" ] && [ "${override}" != "true" ]; then
            allow_run="false"
            echo "::warning::Cost policy is block. Public benchmark job is skipped. Add cost-override-approved label or dispatch with cost_override=true."
          fi

          {
            echo "status=${status}"
            echo "override_used=${override}"
            echo "allow_run=${allow_run}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload cost gate artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: public-benchmark-cost-gate
          path: benchmark/results/ci/cost_gate.*
          retention-days: 14

  benchmark:
    needs: cost-precheck
    if: ${{ needs.cost-precheck.outputs.allow_run == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Resolve benchmark profile
        id: profile
        run: |
          set -euo pipefail
          profile="smoke"
          target_profile="smoke_v2"
          require_training_artifact="false"
          baseline_snapshot="benchmark/baselines/public_benchmark_snapshot_smoke.json"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            profile="full_v3"
            target_profile="full_v3"
            require_training_artifact="true"
            baseline_snapshot="benchmark/baselines/public_benchmark_snapshot_full.json"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.benchmark_profile || 'smoke' }}" = "full" ]; then
            profile="full_v3"
            target_profile="full_v3"
            require_training_artifact="true"
            baseline_snapshot="benchmark/baselines/public_benchmark_snapshot_full.json"
          fi
          {
            echo "profile=${profile}"
            echo "target_profile=${target_profile}"
            echo "require_training_artifact=${require_training_artifact}"
            echo "baseline_snapshot=${baseline_snapshot}"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[dev,ml]"
      - name: Download latest text training bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REQUIRE_TRAINING_ARTIFACT: ${{ steps.profile.outputs.require_training_artifact }}
        run: |
          bash scripts/fetch_latest_text_training_artifact.sh benchmark/results/ci/training_bundle
      - name: Start backend for live benchmark
        env:
          RUN_SCHEDULER_IN_API: "false"
          CONSENSUS_ENABLED: "false"
          C2PA_ENABLED: "false"
          RATE_LIMIT_REQUESTS: "10000"
          RATE_LIMIT_MEDIA_REQUESTS: "10000"
          RATE_LIMIT_BATCH_REQUESTS: "10000"
          TEXT_DETECTION_MODEL_PATH: ${{ env.TEXT_DETECTION_MODEL_PATH }}
          TEXT_CALIBRATION_PROFILE_PATH: ${{ env.TEXT_CALIBRATION_PROFILE_PATH }}
        run: |
          mkdir -p benchmark/results/ci
          cd backend
          nohup uvicorn app.main:app --host 127.0.0.1 --port 8000 > ../benchmark/results/ci/backend.log 2>&1 &
          echo $! > ../benchmark/results/ci/backend.pid
          for i in {1..45}; do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:8000/health > /dev/null || {
            echo "Backend failed to start"
            cat ../benchmark/results/ci/backend.log
            exit 1
          }
      - name: Run public benchmark
        run: |
          python benchmark/eval/run_public_benchmark.py \
            --datasets-dir benchmark/datasets \
            --output-dir benchmark/results/ci \
            --leaderboard-output benchmark/results/ci/leaderboard.json \
            --model-id baseline-heuristic-ci \
            --decision-threshold 0.45 \
            --backend-url http://127.0.0.1:8000 \
            --live-mode true \
            --profile "${{ steps.profile.outputs.profile }}" \
            --profiles-config benchmark/config/benchmark_profiles.yaml
      - name: Check benchmark regressions
        run: |
          python benchmark/eval/check_benchmark_regression.py \
            --current benchmark/results/ci/benchmark_results.json \
            --baseline "${{ steps.profile.outputs.baseline_snapshot }}" \
            --targets-config benchmark/config/benchmark_targets.yaml \
            --target-profile "${{ steps.profile.outputs.target_profile }}" \
            --max-generated-age-hours 72 \
            --require-quality-metrics \
            --forbid-absolute-paths \
            --report-json benchmark/results/ci/regression_check.json \
            --report-md benchmark/results/ci/regression_check.md
      - name: Generate dataset health report
        run: |
          metadata_arg=""
          if [ "${{ steps.profile.outputs.target_profile }}" = "full_v3" ]; then
            metadata_arg="--min-metadata-rows 1500"
          fi
          python benchmark/eval/dataset_health.py \
            --datasets-dir benchmark/datasets \
            --output-json benchmark/results/ci/dataset_health.json \
            --output-md benchmark/results/ci/dataset_health.md \
            --targets-config benchmark/config/benchmark_targets.yaml \
            --target-profile "${{ steps.profile.outputs.target_profile }}" \
            $metadata_arg \
            --enforce
      - name: Stop backend
        if: always()
        run: |
          if [ -f benchmark/results/ci/backend.pid ]; then
            kill "$(cat benchmark/results/ci/backend.pid)" || true
          fi
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: public-benchmark-artifacts
          path: benchmark/results/ci
          retention-days: 14

  benchmark-skipped:
    needs: cost-precheck
    if: ${{ needs.cost-precheck.outputs.allow_run != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Report benchmark skip reason
        run: |
          echo "Public benchmark skipped by cost policy gate." >> "$GITHUB_STEP_SUMMARY"
          echo "- status: ${{ needs.cost-precheck.outputs.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- override_used: ${{ needs.cost-precheck.outputs.override_used }}" >> "$GITHUB_STEP_SUMMARY"
